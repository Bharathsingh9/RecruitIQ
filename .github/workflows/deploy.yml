name: HireGen AI CI/CD Build pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psycopg2-binary reportlab
        python -m spacy download en_core_web_sm

    - name: Run code compilation check
      run: |
        python -m py_compile config.py app.py database/db.py scoring/resume_scorer.py explainability/shap_explainer.py genai/interview_evaluator.py screening/batch_processor.py screening/candidate_ranker.py screening/leaderboard.py reports/pdf_report.py reports/excel_report.py reports/report_generator.py llm/groq_client.py

    - name: Execute parser verification tests
      run: |
        python test_parser.py

