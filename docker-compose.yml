version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hiregen_postgres
    restart: always
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: hiregen_prod
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hiregen_fastapi
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=llama-3.1-8b-instant

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hiregen_react
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pg_data:
